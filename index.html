  :root {

    --green:#22c55e; --yellow:#eab308; --red:#ef4444;
    --blue:#3b82f6; --purple:#a855f7; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;min-height:100vh;padding-bottom:60px;}

  /* ── Header ── */
  header{background:linear-gradient(135deg,#1e1f3a 0%,#12131f 100%);border-bottom:1px solid var(--border);padding:20px 16px 18px;}
  header h1{font-size:20px;font-weight:700;color:#fff;}
  header p{color:var(--muted);margin-top:4px;font-size:12px;}

  /* ── Main wrapper ── */
  .main{max-width:1300px;margin:0 auto;padding:20px 16px 0;}

  /* ── Stats grid ── */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px 12px;}
  .stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .stat-value{font-size:24px;font-weight:700;line-height:1;}
  .stat-value.green{color:var(--green);} .stat-value.yellow{color:var(--yellow);}
  .stat-value.red{color:var(--red);}     .stat-value.blue{color:var(--blue);}
  .stat-value.purple{color:var(--purple);} .stat-value.white{color:#fff;}

  /* ── Controls ── */
  .controls{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .search-wrap{position:relative;width:100%;}
  .search-wrap input{
    width:100%;background:var(--surface);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;
    padding:10px 12px 10px 38px;outline:none;transition:border-color .15s;
  }
  .search-wrap input:focus{border-color:var(--accent);}
  .search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .filters::-webkit-scrollbar{display:none;}
  .filter-btn{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    color:var(--muted);cursor:pointer;font-size:12px;padding:7px 16px;
    white-space:nowrap;flex-shrink:0;transition:all .15s;
  }
  .filter-btn:hover{border-color:var(--accent);color:var(--text);}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ── Shared badges/pills ── */
  .score{display:inline-block;border-radius:6px;font-size:13px;font-weight:700;min-width:36px;padding:2px 8px;text-align:center;}
  .score.high{background:rgba(34,197,94,.15);color:var(--green);}
  .score.mid{background:rgba(234,179,8,.15);color:var(--yellow);}
  .score.low{background:rgba(239,68,68,.15);color:var(--red);}
  .badge{border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.3px;padding:3px 10px;text-transform:capitalize;white-space:nowrap;}
  .badge.applied{background:rgba(34,197,94,.15);color:var(--green);}
  .badge.skipped{background:rgba(234,179,8,.15);color:var(--yellow);}
  .badge.failed{background:rgba(239,68,68,.15);color:var(--red);}
  .badge.pending{background:rgba(99,102,241,.15);color:var(--accent);}
  .badge.dry_run{background:rgba(59,130,246,.15);color:var(--blue);}
  .source-tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;padding:2px 7px;}

  /* ── Detail panel (shared) ── */
  .detail-inner{background:#13151f;border-top:1px solid var(--border);padding:14px 16px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:10px;}
  .field-label{color:var(--muted);font-size:10px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
  .field-value{color:var(--text);font-size:13px;word-break:break-word;}
  .field-value a{color:var(--accent);text-decoration:none;}
  .field-value a:hover{text-decoration:underline;}

  .no-results{color:var(--muted);padding:40px;text-align:center;}
  footer{color:var(--muted);font-size:12px;padding:14px 16px 0;max-width:1300px;margin:0 auto;}

  /* ══════════════════════════════════════════
     DESKTOP TABLE  (≥ 640 px)
  ══════════════════════════════════════════ */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{
    background:var(--surface2);border-bottom:1px solid var(--border);color:var(--muted);
    cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;
    padding:11px 14px;text-align:left;text-transform:uppercase;user-select:none;white-space:nowrap;
  }
  thead th:hover{color:var(--text);}
  thead th .si{opacity:.35;margin-left:4px;font-style:normal;}
  thead th.asc .si, thead th.desc .si{opacity:1;}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  tbody tr.expanded{background:var(--surface2);}
  td{padding:11px 14px;vertical-align:top;}
  .cell-title{font-weight:500;color:#fff;}
  .cell-title a{color:inherit;text-decoration:none;}
  .cell-title a:hover{color:var(--accent);}
  .cell-sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .detail-row td{padding:0;}

  /* ══════════════════════════════════════════
     MOBILE CARDS  (< 640 px)
  ══════════════════════════════════════════ */
  .card-list{display:none;flex-direction:column;gap:10px;}
  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;cursor:pointer;
  }
  .card-main{padding:14px;}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .card-title{font-weight:600;color:#fff;font-size:15px;line-height:1.3;flex:1;}
  .card-company{color:var(--muted);font-size:13px;margin-bottom:8px;}
  .card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .card-detail{background:#13151f;border-top:1px solid var(--border);padding:14px;display:none;}
  .card-detail .detail-grid{grid-template-columns:1fr;}
  .card.open .card-detail{display:block;}
  .card-chevron{color:var(--muted);font-size:16px;flex-shrink:0;transition:transform .2s;}
  .card.open .card-chevron{transform:rotate(180deg);}

  /* ── Responsive breakpoints ── */
  @media(min-width:640px){
    header{padding:28px 32px 24px;}
    header h1{font-size:22px;}
    .main{padding:28px 24px 0;}
    .stats{grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px;}
    .stat{padding:18px 16px 16px;}
    .stat-value{font-size:28px;}
    .controls{flex-direction:row;align-items:center;gap:12px;margin-bottom:20px;}
    .search-wrap{max-width:340px;}
    .search-wrap input{font-size:13px;padding:9px 12px 9px 36px;}
    .table-wrap{display:block;}
    .card-list{display:none !important;}
  }
  @media(max-width:639px){
    .table-wrap{display:none;}
    .card-list{display:flex;}
  }
</style>
</head>

const STATS    = {"total": 271, "applied": 0, "skipped": 271, "failed": 0, "avg": 27.5, "high": 72};
let filtered   = [...ALL_DATA];
let activeFilter = "all";
let sortCol = "created_at", sortDir = "desc";

// ── Stats ──────────────────────────────────────────────────────────────────
function renderStats() {
  document.getElementById("statsBar").innerHTML = [
    {l:"Total",    v:STATS.total,   c:"white" },
    {l:"Applied",  v:STATS.applied, c:"green" },
    {l:"Skipped",  v:STATS.skipped, c:"yellow"},
    {l:"Failed",   v:STATS.failed,  c:"red"   },
    {l:"Avg Score",v:STATS.avg,     c:"blue"  },
    {l:"Top Score",v:STATS.high,    c:"purple"},
  ].map(x=>`<div class="stat"><div class="stat-label">${x.l}</div><div class="stat-value ${x.c}">${x.v}</div></div>`).join("");
}

// ── Filters ────────────────────────────────────────────────────────────────
function renderFilterBtns() {
  document.getElementById("filterBtns").innerHTML =
    ["all","applied","skipped","failed","pending"].map(s=>
      `<button class="filter-btn${s===activeFilter?' active':''}" onclick="setFilter('${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`
    ).join("");
}
function setFilter(s){activeFilter=s;renderFilterBtns();applyFilters();}

// ── Filter + sort ──────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  filtered = ALL_DATA.filter(r => {
    if (activeFilter !== "all" && r.status !== activeFilter) return false;
    return !q || (r.title+r.company+r.location+r.source).toLowerCase().includes(q);
  });
  sortFiltered();
  renderTable();
  renderCards();
}
function sortBy(col) {
  if (sortCol===col) sortDir = sortDir==="asc"?"desc":"asc";
  else { sortCol=col; sortDir=(col==="match_score"||col==="created_at")?"desc":"asc"; }
  document.querySelectorAll("thead th").forEach(th=>{
    th.classList.remove("asc","desc");
    if(th.dataset.col===col) th.classList.add(sortDir);
  });
  sortFiltered(); renderTable(); renderCards();
}
function sortFiltered() {
  filtered.sort((a,b)=>{
    let va=a[sortCol]??"", vb=b[sortCol]??"";
    if(typeof va==="number") return sortDir==="asc"?va-vb:vb-va;
    va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
    return sortDir==="asc"?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function sc(s){return s>=75?"high":s>=50?"mid":"low";}
function fd(d){if(!d)return"—";try{return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch{return d;}}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

function detailHTML(r) {
  return `<div class="detail-grid">
    <div>
      <div class="field"><div class="field-label">Job Link</div>
        <div class="field-value"><a href="${r.job_url}" target="_blank">Open posting</a></div></div>
      <div class="field"><div class="field-label">Recommendation</div>
        <div class="field-value">${esc(r.recommendation)||"—"}</div></div>
      <div class="field"><div class="field-label">Applied</div>
        <div class="field-value">${r.applied_at?fd(r.applied_at):"—"}</div></div>
    </div>
    <div>
      <div class="field"><div class="field-label">Salary</div>
        <div class="field-value">${esc(r.salary)||"—"}</div></div>
      <div class="field"><div class="field-label">Location</div>
        <div class="field-value">${esc(r.location)||"—"}</div></div>
      <div class="field"><div class="field-label">Notes</div>
        <div class="field-value">${esc(r.notes)||"—"}</div></div>
    </div>
  </div>`;
}

// ── Desktop table ──────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById("tableBody");
  if (!filtered.length) {
    tbody.innerHTML=`<tr><td colspan="7"><div class="no-results">No applications match.</div></td></tr>`;
    document.getElementById("footer").textContent="";
    return;
  }
  tbody.innerHTML="";
  filtered.forEach((r,i)=>{
    const tr=document.createElement("tr");
    tr.id="row-"+i;
    tr.innerHTML=`
      <td><div class="cell-title"><a href="${r.job_url}" target="_blank" onclick="event.stopPropagation()">${esc(r.title)||"—"}</a></div></td>
      <td><div class="cell-title" style="font-weight:400">${esc(r.company)||"—"}</div>
          <div class="cell-sub">${esc(r.location)||""}</div></td>
      <td><div class="cell-sub">${esc(r.location)||"—"}</div>
          ${r.salary?`<div class="cell-sub">${esc(r.salary)}</div>`:""}</td>
      <td><span class="score ${sc(r.match_score)}">${r.match_score}</span></td>
      <td><span class="badge ${r.status}">${r.status}</span></td>
      <td><span class="source-tag">${esc(r.source)||"—"}</span></td>
      <td style="color:var(--muted);font-size:12px;">${fd(r.created_at)}</td>`;
    tr.onclick=()=>toggleTableRow(i,r,tr);
    tbody.appendChild(tr);
    const det=document.createElement("tr");
    det.id="det-"+i; det.className="detail-row"; det.style.display="none";
    det.innerHTML=`<td colspan="7"></td>`;
    tbody.appendChild(det);
  });
  document.getElementById("footer").textContent=
    `Showing ${filtered.length} of ${ALL_DATA.length} application${ALL_DATA.length!==1?"s":""}.`;
}

function toggleTableRow(i,r,tr) {
  const det=document.getElementById("det-"+i);
  const open=det.style.display!=="none";
  document.querySelectorAll(".detail-row").forEach(d=>d.style.display="none");
  document.querySelectorAll("tbody tr:not(.detail-row)").forEach(t=>t.classList.remove("expanded"));
  if(open) return;
  tr.classList.add("expanded"); det.style.display="";
  det.querySelector("td").innerHTML=`<div class="detail-inner">${detailHTML(r)}</div>`;
}

// ── Mobile cards ───────────────────────────────────────────────────────────
function renderCards() {
  const list = document.getElementById("cardList");
  if (!filtered.length) {
    list.innerHTML=`<div class="no-results">No applications match.</div>`;
    return;
  }
  list.innerHTML="";
  filtered.forEach((r,i)=>{
    const card=document.createElement("div");
    card.className="card"; card.id="card-"+i;
    card.innerHTML=`
      <div class="card-main">
        <div class="card-top">
          <div class="card-title"><a href="${r.job_url}" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">${esc(r.title)||"—"}</a></div>
          <span class="card-chevron">⌄</span>
        </div>
        <div class="card-company">${esc(r.company)||"—"}</div>
        <div class="card-row">
          <span class="score ${sc(r.match_score)}">${r.match_score}</span>
          <span class="badge ${r.status}">${r.status}</span>
          <span class="source-tag">${esc(r.source)||"—"}</span>
          <span style="color:var(--muted);font-size:12px;">${fd(r.created_at)}</span>
        </div>
      </div>
      <div class="card-detail">${detailHTML(r)}</div>`;
    card.onclick=(e)=>{
      if(e.target.tagName==="A") return;
      const isOpen=card.classList.contains("open");
      document.querySelectorAll(".card.open").forEach(c=>c.classList.remove("open"));
      if(!isOpen) card.classList.add("open");
    };
    list.appendChild(card);
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
renderStats();
renderFilterBtns();
applyFilters();
</script>
